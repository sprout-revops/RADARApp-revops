name: Refresh Dashboard Data

on:
  schedule:
    # 3x daily — 1am, 9am, 5pm PHT (UTC+8) = 5pm, 1am, 9am UTC previous day
    - cron: '0 1,9,17 * * *'   # 9am, 5pm, 1am PHT
  workflow_dispatch:             # manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write            # allow pushing data/dashboard.json back to repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Databricks data
        env:
          DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN:     ${{ secrets.DATABRICKS_TOKEN }}
        run: python fetch_data.py

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --staged --quiet || git commit -m "chore: refresh dashboard data [skip ci]"
          git push
