name: Refresh Sales Dashboard Data

on:
  schedule:
    # PHT = UTC+8. Runs at 8:30 AM, 1:30 PM, and 5:15 PM PHT (Mon–Fri)
    - cron: '30 0 * * 1-5'   # 8:30 AM PHT
    - cron: '30 5 * * 1-5'   # 1:30 PM PHT
    - cron: '15 9 * * 1-5'   # 5:15 PM PHT
  workflow_dispatch:           # manual trigger from GitHub UI

permissions:
  contents: write              # allow bot to commit and push data

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Databricks
        env:
          DATABRICKS_HOST:      ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN:     ${{ secrets.DATABRICKS_TOKEN }}
        run: python fetch_data.py

      - name: Generate accelerator snapshot
        run: python check_accel.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json accel_snapshot.json
          git diff --staged --quiet || git commit -m "Auto-refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
